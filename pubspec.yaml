name: tollbd
description: "TollBD smart digital toll payment app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  hive_flutter: ^1.1.0
  dio: ^5.4.0
  webview_flutter: ^4.7.0
  local_auth: ^2.1.8
  pinput: ^3.0.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  file_picker: ^8.0.7
  fl_chart: ^0.66.2
  intl: ^0.19.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.0.0
  connectivity_plus: ^6.0.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.3.3
  crypto: ^3.0.3
  mobile_scanner: ^3.5.6
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  flutter_svg: ^2.0.10
  pdf: ^3.10.7
  printing: ^5.12.0
  encrypt: ^5.0.3
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.11
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Regular.ttf
        - asset: assets/fonts/HindSiliguri-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
